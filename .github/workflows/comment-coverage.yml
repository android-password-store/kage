name: Comment coverage
on:
  workflow_run: # zizmor: ignore[dangerous-triggers] This workflow only downloads an artifact from the unprivileged PR workflow and posts a PR comment.
    workflows:
      - Run tests
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  comment-coverage:
    name: Comment coverage on PR
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read # Required to locate and download the artifact from the triggering workflow run.
      contents: read
      pull-requests: write # Required to create or update the coverage PR comment.
    runs-on: ubuntu-latest
    steps:
    - name: Download coverage artifact from triggering run
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.payload.workflow_run.id,
          });
          const matchArtifact = artifacts.data.artifacts.find((artifact) => artifact.name === 'coverage-report');
          if (!matchArtifact) {
            core.setFailed('Could not find coverage-report artifact on triggering workflow run.');
            return;
          }
          const download = await github.rest.actions.downloadArtifact({
            owner: context.repo.owner,
            repo: context.repo.repo,
            artifact_id: matchArtifact.id,
            archive_format: 'zip',
          });
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/coverage-report.zip`, Buffer.from(download.data));

    - name: Unpack coverage artifact
      shell: bash
      run: unzip -o coverage-report.zip -d coverage-report

    - name: Add coverage report to PR
      id: kover
      uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d # v2
      with:
        path: coverage-report/report.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        title: Code Coverage
        update-comment: true
        min-coverage-overall: 80
        min-coverage-changed-files: 80
